services:
  # SOCKS5-мост до Telegram через XRay (VLESS + Reality), например до Amnezia-сервера.
  # Настройка: cp xray/config.json.example xray/config.json и заполнить свои значения.
  # Бот ходит на него по внутренней сети: TELEGRAM_PROXY=socks5://xray:1080
  xray:
    image: ghcr.io/xtls/xray-core:latest
    container_name: homepilot-xray
    restart: unless-stopped
    command: ["run", "-c", "/etc/xray/config.json"]
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
    ports:
      # Только для локальной отладки с хоста (curl --socks5-hostname 127.0.0.1:1080)
      - "127.0.0.1:1080:1080"

  homepilot:
    build: .
    container_name: homepilot
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=${TZ:-Europe/Moscow}
    # Чтобы ZAPRET_SSH_HOST=host.docker.internal резолвился в IP хоста
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Управление Docker-контейнерами (обязательно для /containers, /logs, /restart)
      - /var/run/docker.sock:/var/run/docker.sock
      # Корень хоста только для чтения — чтобы видеть реальные диски (/disk, /status)
      - /:/host/root:ro
      # Состояние батареи ноутбука: детектор отключения света + лимит заряда.
      # rw нужен для записи charge_control_end_threshold (BATTERY_CHARGE_LIMIT)
      - /sys/class/power_supply:/sys/class/power_supply:rw
      # SSH-ключ для управления zapret на хосте (только чтение)
      - ./ssh:/app/ssh:ro
      # История метрик для /graph — переживает пересборку образа
      - ./data:/app/data
    # Для SMART-мониторинга (/smart, SMART_DEVICES в .env) раскомментируйте
    # и подставьте свой диск (узнать: lsblk -d -o NAME,TYPE,SIZE):
    # devices:
    #   - /dev/nvme0n1:/dev/nvme0n1   # NVMe-диск (или /dev/sda для SATA)
    # cap_add:
    #   - SYS_RAWIO   # доступ к SMART у SATA-дисков
    #   - SYS_ADMIN   # доступ к SMART у NVMe-дисков
