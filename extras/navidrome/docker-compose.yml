# Navidrome — стриминг музыки из ~/media/music.
# Запуск:  cd extras/navidrome && sudo docker compose up -d
# Веб:     http://<IP-сервера>:4533 (при первом входе создаётся админ)
# Приложения: любые Subsonic-совместимые (Symfonium, substreamer, Tempo, play:Sub)
#
# Чтобы HomePilot следил за Navidrome, добавьте в .env бота:
#   WATCH_URLS=Navidrome:http://<IP-сервера>:4533
services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    ports:
      - "4533:4533"
    environment:
      ND_SCANSCHEDULE: 1h          # автосканирование новой музыки
      ND_LOGLEVEL: info
      ND_DEFAULTLANGUAGE: ru
      ND_ENABLETRANSCODINGCONFIG: "true"
    volumes:
      - ./data:/data               # база и кеш Navidrome
      - /home/san/media/music:/music:ro
